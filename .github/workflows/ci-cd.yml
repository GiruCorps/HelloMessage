name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop

jobs:
  linting-testing:
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Lint (ESLint)
        run: npm run lint

      - name: Run tests
        run: npm test

  build:
    runs-on: ubuntu-latest
    needs: linting-testing
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Build Docker
        run: docker build -t devops-app .

  deploy-dev:
    if: github.ref == 'refs/heads/develop'
    needs: build
    runs-on: ubuntu-latest
    environment: development

    steps:
      - name: Deploy to DEV
        run: |
          echo "Deploying to DEV environment"
          echo "Version: $GITHUB_SHA"

  deploy-prod:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy to PROD
        run: |
          echo "Deploying to PROD environment"
          echo "Version: $GITHUB_SHA"
