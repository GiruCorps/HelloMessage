name: CI/CD Pipeline

on:
  push:
    branches:
      - master
      - develop

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Lint (ESLint)
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build Docker
        run: docker build -t devops-app .

  deploy-dev:
    if: github.ref == 'refs/heads/develop'
    needs: build-test
    runs-on: ubuntu-latest
    environment: development

    steps:
      - name: Deploy to DEV
        run: |
          echo "Deploying to DEV environment"
          echo "Version: $GITHUB_SHA"

  deploy-prod:
    if: github.ref == 'refs/heads/master'
    needs: build-test
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy to PROD
        run: |
          echo "Deploying to PRODUCTION"
          echo "Version: $GITHUB_SHA"
